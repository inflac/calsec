name: Release

# Triggered by pushing a version tag, e.g.: git tag v1.2.3 && git push --tags
on:
  push:
    tags:
      - 'v[0-9]*'

permissions:
  contents: write  # required to create GitHub releases

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:

  build-linux:
    runs-on: ubuntu-latest
    container: debian:12
    steps:
      - name: Install system dependencies
        run: |
          apt-get update -qq
          apt-get install -y git python3 python3-pip python3-tk python3-venv pandoc zip

      - uses: actions/checkout@v4

      - name: Install Python dependencies
        run: |
          python3 -m venv .venv
          .venv/bin/pip install -r requirements.txt

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION = \"$VERSION\"" > gui/version.py
          echo "Building version $VERSION"

      - name: Build HTML docs
        run: |
          mkdir -p build
          pandoc README.md -o build/README.html --standalone --include-in-header=assets/style.css --lua-filter=assets/admonition.lua --metadata title="CalSec" --metadata charset=UTF-8
          pandoc WHITEPAPER.md -o build/WHITEPAPER.html --standalone --include-in-header=assets/style.css --lua-filter=assets/admonition.lua --metadata title="CalSec — Whitepaper" --metadata charset=UTF-8

      - name: Build Linux binary
        run: |
          .venv/bin/python -m PyInstaller \
            --onefile \
            --name calsec-linux \
            --noconsole \
            --strip \
            --optimize=2 \
            --add-data "$PWD/assets/icon.png:." \
            --collect-all cryptography \
            --distpath build \
            --workpath build/work \
            --specpath build/spec \
            gui/main.py

      - name: Sign binary
        env:
          RELEASE_SIGNING_KEY: ${{ secrets.RELEASE_SIGNING_KEY }}
        run: .venv/bin/python scripts/sign_release.py build/calsec-linux

      - name: Package Linux zip
        run: |
          cd build && zip -j calsec-linux.zip \
            calsec-linux \
            calsec-linux.sig \
            ../assets/icon.png \
            ../assets/install_calsec.sh \
            README.html \
            WHITEPAPER.html

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/calsec-linux
            build/calsec-linux.sig
            build/calsec-linux.zip
